<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sastavouchers - Secure Login</title>
    <style>
        /* --- CSS Design --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135h, #667eea 0%, #764ba2 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        .login-container h1 {
            margin-top: 0;
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .login-container p {
            color: #777;
            margin-bottom: 30px;
        }

        /* Login Options Styling */
        .login-option {
            border: 2px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #555;
        }

        .login-option:hover {
            background-color: #f9f9f9;
            border-color: #ccc;
        }

        .login-option img {
            width: 20px;
            margin-right: 10px;
        }

        /* Separator */
        .divider {
            margin: 25px 0;
            position: relative;
            text-align: center;
        }

        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 45%;
            height: 1px;
            background: #ddd;
        }

        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            right: 0;
            width: 45%;
            height: 1px;
            background: #ddd;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            color: #aaa;
            font-size: 14px;
        }

        /* Admin Key Input */
        .admin-section {
            display: none; /* Hidden by default */
            margin-top: 20px;
        }

        #adminKey {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .btn-admin {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-admin:hover {
            background-color: #1a252f;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            display: none;
            margin-top: 10px;
        }

        .show-admin-link {
            color: #3498db;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 15px;
            display: inline-block;
        }

    </style>
</head>
<body>

    <div class="login-container">
        <h1>Welcome to Sastavouchers</h1>
        <p>Please choose your login method</p>

        <!-- --- User Options --- -->
        <div class="login-option" onclick="handleUserLogin('Guest')">
            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077063.png" alt="Guest">
            Continue as Guest
        </div>

        <!-- Gmail / Google login simulation -->
        <div class="login-option" onclick="handleUserLogin('Google')">
            <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" alt="Google">
            Sign in with Google
        </div>

        <div class="divider"><span>or</span></div>

        <!-- --- Admin Section --- -->
        <div class="show-admin-link" onclick="toggleAdminInput()">I am Admin</div>
        
        <div id="adminSection" class="admin-section">
            <input type="password" id="adminKey" placeholder="Enter Admin Key">
            <button class="btn-admin" onclick="checkAdminKey()">Admin Login</button>
            <p id="adminError" class="error-msg">Invalid Key!</p>
        </div>

    </div>

    <!-- --- JavaScript Logic --- -->
    <script>
        // User Login Simulation
        function handleUserLogin(method) {
            alert("Logging in as " + method + " (Prototype: Redirecting to Buyer Page, which isn't built yet).");
            // In real life, you'd do window.location.href = 'user_dashboard.html'
        }

        // Show Admin Key Input
        function toggleAdminInput() {
            const section = document.getElementById('adminSection');
            const link = document.querySelector('.show-admin-link');
            if (section.style.display === 'none' || section.style.display === '') {
                section.style.display = 'block';
                link.innerText = "Hide Admin Login";
            } else {
                section.style.display = 'none';
                link.innerText = "I am Admin";
            }
        }

        // Check Secret Admin Key
        function checkAdminKey() {
            const inputKey = document.getElementById('adminKey').value;
            const errorMsg = document.getElementById('adminError');
            
            // SECRET KEY CHECK 
            // Note: This is visible in browser source code, 
            // real security requires backend server.
            if (inputKey === "Sellerone1") {
                alert("Key accepted! Redirecting to Admin Panel.");
                window.location.href = 'admin.html'; // Redirect to previous file
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('adminKey').value = '';
            }
        }
    </script>
</body>
  </html>
